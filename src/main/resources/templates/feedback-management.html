<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkNow - Feedback Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/parknow_remaining.css">
</head>
<body>
    
    <div class="topbar">
    <div class="topbar-logo" onclick="nav('pg-feedback-mgmt')"><div class="logo-mark">P</div>ParkNow</div>
    <div class="topbar-right"><span class="badge badge-gold">Administrator</span><button class="btn btn-outline btn-sm" type="button" onclick="logout()">Logout</button></div>
  </div>
  <div class="app-shell">
    <aside class="sidebar">
      <div style="padding:16px 12px 0;"><div class="sidebar-user"><div class="sidebar-avatar" style="background:linear-gradient(135deg,var(--teal),var(--dark-mid));color:#fff;">SA</div><div><div class="sidebar-uname">Super Admin</div><div class="sidebar-role">Administrator</div></div></div></div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">Overview</div>
        <button class="sidebar-item" onclick="showPage('pg-admin-dash')"><span class="s-icon">📊</span> Dashboard</button>
        <div class="sidebar-section">Management</div>
        <button class="sidebar-item" onclick="showPage('pg-drivers')"><span class="s-icon">👥</span> Driver Management</button>
        <button class="sidebar-item" onclick="showPage('pg-vehicles')"><span class="s-icon">🚗</span> Vehicle Management</button>
        <button class="sidebar-item" onclick="showPage('pg-slots')"><span class="s-icon">🅿️</span> Slot Management</button>
        <button class="sidebar-item" onclick="showPage('pg-admins')"><span class="s-icon">🛡️</span> Admin Management</button>
        <button class="sidebar-item" onclick="showPage('pg-reservations')"><span class="s-icon">📋</span> Reservation Management</button>
        <button class="sidebar-item active" onclick="showPage('pg-feedback')"><span class="s-icon">💬</span> Feedback Management</button>
      </nav>
      <div class="sidebar-bottom"><button class="sidebar-item" type="button" onclick="logout()"><span class="s-icon">🚪</span> Logout</button></div>
    </aside>

    <main class="main-content">
      <div class="admin-page-header">
        <div><div class="admin-page-title">Feedback &amp; Reviews</div><div class="admin-page-sub">Monitor, moderate, and manage all driver feedback submissions.</div></div>
        <div style="display:flex;gap:10px;"><button class="btn btn-outline btn-sm">📤 Export</button></div>
      </div>
      <div class="g4 mb-28">
        <div class="stat-card c-gold"><div class="accent-bar"></div><div class="stat-label">Average Rating</div><div class="stat-value" id="stat-avg-rating">—</div><div class="stat-sub">Out of 5.0</div></div>
        <div class="stat-card c-teal"><div class="accent-bar"></div><div class="stat-label">Total Reviews</div><div class="stat-value" id="stat-total-reviews">0</div></div>
        <div class="stat-card c-green"><div class="accent-bar"></div><div class="stat-label">This Week</div><div class="stat-value" id="stat-this-week">0</div><div class="stat-sub" id="stat-week-sub">—</div></div>
        <div class="stat-card c-danger"><div class="accent-bar"></div><div class="stat-label">Flagged</div><div class="stat-value" id="stat-flagged">0</div><div class="stat-sub">Low ratings (1–2 ★)</div></div>
      </div>
      <div class="filter-bar">
        <div class="search-wrap"><div class="search-bar"><span>🔍</span><input type="text" id="feedback-search" placeholder="Search by driver or comment..." oninput="onFeedbackSearch(this.value)"></div></div>
        <select class="form-input" id="filter-rating" style="width:130px;padding:9px 14px;" onchange="renderFeedbackTable()">
          <option value="">All Ratings</option>
          <option value="5">5 ★</option>
          <option value="4">4 ★</option>
          <option value="3">3 ★</option>
          <option value="low">1-2 ★</option>
        </select>
        <select class="form-input" id="filter-category" style="width:140px;padding:9px 14px;" onchange="renderFeedbackTable()">
          <option value="">All Categories</option>
          <option value="GENERAL">General</option>
          <option value="CLEANLINESS">Cleanliness</option>
          <option value="SAFETY">Safety</option>
          <option value="STAFF">Staff</option>
        </select>
        <select class="form-input" id="filter-status" style="width:140px;padding:9px 14px;" onchange="renderFeedbackTable()">
          <option value="">All Status</option>
          <option value="PUBLISHED">Published</option>
          <option value="FLAGGED">Flagged</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Driver</th><th>Rating</th><th>Category</th><th>Comment</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="feedback-tbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/feedback-management.js"></script>

</body>
</html>
