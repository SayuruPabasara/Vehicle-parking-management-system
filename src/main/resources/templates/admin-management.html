<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkNow - Admin Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/parknow_remaining.css">
</head>
<body>
    <div class="topbar">
    <div class="topbar-logo" onclick="nav('pg-admin-mgmt')"><div class="logo-mark">P</div>ParkNow</div>
    <div class="topbar-right"><span class="badge badge-gold">Administrator</span><button class="btn btn-outline btn-sm" type="button" onclick="logout()">Logout</button></div>
  </div>
  <div class="app-shell">
    <aside class="sidebar">
      <div style="padding:16px 12px 0;">
        <div class="sidebar-user">
          <div class="sidebar-avatar" style="background:linear-gradient(135deg,var(--teal),var(--dark-mid));color:#fff;" th:with="pad=${username + username}" th:text="${#strings.toUpperCase(#strings.substring(pad,0,2))}">SA</div>
          <div>
            <div class="sidebar-uname" th:text="${username}">Super Admin</div>
            <div class="sidebar-role">System Administrator</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">Overview</div>
        <button class="sidebar-item" onclick="showPage('pg-admin-dash')"><span class="s-icon">📊</span> Dashboard</button>
        <div class="sidebar-section">Management</div>
        <button class="sidebar-item" onclick="showPage('pg-drivers')"><span class="s-icon">👥</span> Driver Management</button>
        <button class="sidebar-item" onclick="showPage('pg-vehicles')"><span class="s-icon">🚗</span> Vehicle Management</button>
        <button class="sidebar-item" onclick="showPage('pg-slots')"><span class="s-icon">🅿️</span> Slot Management</button>
        <button class="sidebar-item active" onclick="showPage('pg-admins')"><span class="s-icon">🛡️</span> Admin Management</button>
        <button class="sidebar-item" onclick="showPage('pg-reservations')"><span class="s-icon">📋</span> Reservation Management</button>
        <button class="sidebar-item" onclick="showPage('pg-feedback')"><span class="s-icon">💬</span> Feedback Management</button>
      </nav>
    </aside>

    <main class="main-content">
      <div class="admin-page-header">
        <div><div class="admin-page-title">Admin Management</div><div class="admin-page-sub">Manage system administrators and their access roles.</div></div>
        <button class="btn btn-teal" onclick="toggleAddAdmin()">+ Add Administrator</button>
      </div>

      <!-- Add Admin form (collapsible) -->
      <div class="card mb-28" id="addAdminPanel" style="display:none;border-color:var(--teal);border-left:4px solid var(--teal);">
        <div class="section-title" style="color:var(--teal);margin-bottom:20px;">New Administrator Account</div>
        <p id="addAdminMsg" class="form-msg" style="display:none;margin-bottom:12px;"></p>
        <form id="adminCreateForm">
          <div class="g2">
            <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" name="fullName" id="adm-fullName" required placeholder="Admin Full Name" autocomplete="name"></div>
            <div class="form-group"><label class="form-label">Username</label><input class="form-input" name="userName" id="adm-userName" required placeholder="admin_username" autocomplete="username"></div>
            <div class="form-group"><label class="form-label">Email Address</label><input class="form-input" name="email" id="adm-email" type="email" required placeholder="admin@parknow.com" autocomplete="email"></div>
            <div class="form-group"><label class="form-label">Phone</label><input class="form-input" name="phone" id="adm-phone" type="tel" placeholder="+94 …"></div>
            <div class="form-group">
              <label class="form-label">Admin Role</label>
              <select class="form-input" name="adminLevel" id="adm-adminLevel" required>
                <option value="SUPER">Super Admin</option>
                <option value="PARKING" selected>Parking Admin</option>
                <option value="FINANCE">Finance Admin</option>
                <option value="READONLY">Read-Only Admin</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Password</label><input class="form-input" name="password" id="adm-password" type="password" required placeholder="••••••••" autocomplete="new-password"></div>
            <div class="form-group"><label class="form-label">Confirm Password</label><input class="form-input" id="adm-confirmPassword" type="password" required placeholder="••••••••" autocomplete="new-password"></div>
          </div>
          <div style="display:flex;gap:10px;margin-top:20px;">
            <button type="submit" class="btn btn-teal" id="adm-submitBtn">Create Administrator</button>
            <button type="button" class="btn btn-outline" onclick="toggleAddAdmin()">Cancel</button>
          </div>
        </form>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Admin ID</th><th>Full Name</th><th>Username</th><th>Email</th><th>Phone</th><th>Role</th><th>Created by</th><th>Actions</th></tr></thead>
          <tbody id="adminsTableBody">
            <tr><td colspan="8" style="text-align:center;color:var(--ink-muted);padding:24px;">Loading administrators…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/admin-management.js"></script>

</body>
</html>
