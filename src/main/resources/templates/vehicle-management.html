<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkNow - Vehicle Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/parknow_remaining.css">
</head>
<body>
    
    <div class="topbar">
    <div class="topbar-logo" onclick="nav('pg-vehicle-mgmt')"><div class="logo-mark">P</div>ParkNow</div>
    <div class="topbar-right"><span class="badge badge-gold">Administrator</span><button class="btn btn-outline btn-sm" type="button" onclick="logout()">Logout</button></div>
  </div>
  <div class="app-shell">
    <aside class="sidebar">
      <div style="padding:16px 12px 0;"><div class="sidebar-user"><div class="sidebar-avatar" style="background:linear-gradient(135deg,var(--teal),var(--dark-mid));color:#fff;">SA</div><div><div class="sidebar-uname">Super Admin</div><div class="sidebar-role">Administrator</div></div></div></div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">Overview</div>
        <button class="sidebar-item" onclick="showPage('pg-admin-dash')"><span class="s-icon">📊</span> Dashboard</button>
        <div class="sidebar-section">Management</div>
        <button class="sidebar-item" onclick="showPage('pg-drivers')"><span class="s-icon">👥</span> Driver Management</button>
        <button class="sidebar-item active" onclick="showPage('pg-vehicles')"><span class="s-icon">🚗</span> Vehicle Management</button>
        <button class="sidebar-item" onclick="showPage('pg-slots')"><span class="s-icon">🅿️</span> Slot Management</button>
        <button class="sidebar-item" onclick="showPage('pg-admins')"><span class="s-icon">🛡️</span> Admin Management</button>
        <button class="sidebar-item" onclick="showPage('pg-reservations')"><span class="s-icon">📋</span> Reservation Management</button>
        <button class="sidebar-item" onclick="showPage('pg-feedback')"><span class="s-icon">💬</span> Feedback Management</button>
      </nav>
      <div class="sidebar-bottom"><button class="sidebar-item" type="button" onclick="logout()"><span class="s-icon">🚪</span> Logout</button></div>
    </aside>

    <main class="main-content">
      <div class="admin-page-header">
        <div><div class="admin-page-title">Vehicle Management</div><div class="admin-page-sub">All vehicles registered in the system.</div></div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-outline btn-sm" type="button" disabled>📤 Export</button>
          <button class="btn btn-teal btn-sm" type="button" disabled title="Drivers register vehicles from their account">+ Register Vehicle</button>
        </div>
      </div>
      <div class="g4 mb-28">
        <div class="stat-card c-gold"><div class="accent-bar"></div><div class="stat-label">Total Vehicles</div><div class="stat-value" id="statTotalVehicles">—</div></div>
        <div class="stat-card c-teal"><div class="accent-bar"></div><div class="stat-label">Active</div><div class="stat-value" id="statActiveVehicles">—</div></div>
        <div class="stat-card c-orange"><div class="accent-bar"></div><div class="stat-label">Flagged</div><div class="stat-value" id="statFlaggedVehicles">—</div><div class="stat-sub">Missing or non-driver owner</div></div>
        <div class="stat-card c-green"><div class="accent-bar"></div><div class="stat-label">Types</div><div class="stat-value" id="statTypeCount">—</div><div class="stat-sub" id="statTypeLabels">—</div></div>
      </div>
      <div class="filter-bar">
        <div class="search-wrap"><div class="search-bar"><span>🔍</span><input type="text" id="vehicleSearch" placeholder="Search by plate number or owner..."></div></div>
        <select class="form-input" id="vehicleTypeFilter" style="width:140px;padding:9px 14px;">
          <option value="all">All Types</option>
        </select>
        <select class="form-input" id="vehicleStatusFilter" style="width:140px;padding:9px 14px;">
          <option value="all">All Status</option>
          <option value="ACTIVE">Active</option>
          <option value="FLAGGED">Flagged</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Vehicle ID</th><th>Plate Number</th><th>Type</th><th>Color</th><th>Owner</th><th>Owner ID</th><th>Registered</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="vehiclesTableBody">
            <tr><td colspan="9" style="text-align:center;color:var(--ink-muted);padding:24px;">Loading vehicles…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/vehicle-management.js"></script>

</body>
</html>
