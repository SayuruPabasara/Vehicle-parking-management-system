<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkNow - Edit Modal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/parknow_remaining.css">
</head>
<body>
    <div class="modal-box">
    <div class="modal-title" id="editModalTitle">Edit Record</div>
    <div class="modal-sub" id="editModalSub">Update the fields below and save.</div>
    <div class="gap-16" id="editModalFields">
      <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" value="John Doe"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" value="john@example.com"></div>
      <div class="form-group"><label class="form-label">Status</label><select class="form-input"><option>Active</option><option>Suspended</option></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-teal" onclick="closeModal('editModal');showToast('✅ Record updated successfully')">Save Changes</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box modal-danger">
    <div class="modal-title">⚠️ Confirm Deletion</div>
    <div class="modal-sub" id="deleteModalMsg">Are you sure you want to delete this record? This action cannot be undone.</div>
    <div style="background:var(--danger-light);border:1px solid rgba(224,60,60,0.2);border-radius:var(--radius-sm);padding:14px 16px;font-size:0.85rem;color:var(--danger);font-weight:500;">
      This is a permanent action. The data cannot be recovered after deletion.
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="btn btn-danger" onclick="closeModal('deleteModal');showToast('🗑️ Record deleted successfully')">Delete Permanently</button>
    </div>
  </div>
</div>

<!-- SLOT EDIT MODAL -->
<div class="modal-overlay" id="slotEditModal">
  <div class="modal-box">
    <div class="modal-title">Edit Slot <span id="slotEditId" style="color:var(--teal);">A-07</span></div>
    <div class="modal-sub">Update slot configuration and pricing.</div>
    <div class="gap-16">
      <div class="g2">
        <div class="form-group"><label class="form-label">Slot ID</label><input class="form-input" id="seSlotId" value="A-07" disabled></div>
        <div class="form-group"><label class="form-label">Section</label><select class="form-input"><option>A</option><option>B</option><option>C</option></select></div>
      </div>
      <div class="g2">
        <div class="form-group"><label class="form-label">Type</label><select class="form-input"><option>Standard</option><option>Large</option><option>Disabled</option></select></div>
        <div class="form-group"><label class="form-label">Floor</label><select class="form-input"><option>Ground</option><option>Level 1</option><option>Level 2</option></select></div>
      </div>
      <div class="g2">
        <div class="form-group"><label class="form-label">Rate (LKR / hr)</label><input class="form-input" type="number" value="150"></div>
        <div class="form-group"><label class="form-label">Status</label><select class="form-input"><option>Available</option><option>Occupied</option><option>Maintenance</option></select></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('slotEditModal')">Cancel</button>
      <button class="btn btn-teal" onclick="closeModal('slotEditModal');showToast('✅ Slot updated successfully')">Save Changes</button>
    </div>
  </div>

  <script src="edit-modal.js"></script>

</body>
</html>
