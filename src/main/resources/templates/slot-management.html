<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkNow - Slot Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/parknow_remaining.css">
</head>
<body>
    
    <div class="topbar">
    <div class="topbar-logo" onclick="showPage('pg-slots')"><div class="logo-mark">P</div>ParkNow</div>
    <div class="topbar-right"><span class="badge badge-gold">Administrator</span><button class="btn btn-outline btn-sm" type="button" onclick="logout()">Logout</button></div>
  </div>
  <div class="app-shell">
    <aside class="sidebar">
      <div style="padding:16px 12px 0;">
        <div class="sidebar-user">
          <div class="sidebar-avatar" style="background:linear-gradient(135deg,var(--teal),var(--dark-mid));color:#fff;" th:with="pad=${username + username}" th:text="${#strings.toUpperCase(#strings.substring(pad,0,2))}">SA</div>
          <div>
            <div class="sidebar-uname" th:text="${username}">Super Admin</div>
            <div class="sidebar-role">System Administrator</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">Overview</div>
        <button class="sidebar-item" onclick="showPage('pg-admin-dash')"><span class="s-icon">📊</span> Dashboard</button>
        <div class="sidebar-section">Management</div>
        <button class="sidebar-item" onclick="showPage('pg-drivers')"><span class="s-icon">👥</span> Driver Management</button>
        <button class="sidebar-item" onclick="showPage('pg-vehicles')"><span class="s-icon">🚗</span> Vehicle Management</button>
        <button class="sidebar-item active" onclick="showPage('pg-slots')"><span class="s-icon">🅿️</span> Slot Management</button>
        <button class="sidebar-item" onclick="showPage('pg-admins')"><span class="s-icon">🛡️</span> Admin Management</button>
        <button class="sidebar-item" onclick="showPage('pg-reservations')"><span class="s-icon">📋</span> Reservation Management</button>
        <button class="sidebar-item" onclick="showPage('pg-feedback')"><span class="s-icon">💬</span> Feedback Management</button>
      </nav>
    </aside>

    <main class="main-content">
      <div class="admin-page-header">
        <div><div class="admin-page-title">Slot Management</div><div class="admin-page-sub">Edit slot configurations, rates, and availability status.</div></div>
        <button class="btn btn-teal" type="button" onclick="toggleEditSlot()">+ Edit Slot</button>
      </div>

      <div class="card mb-28" id="editSlotPanel" style="display:none;border-color:var(--teal);border-left:4px solid var(--teal);">
        <div class="section-title" style="color:var(--teal);margin-bottom:20px;">Edit Parking Slot</div>
        <p id="editSlotMsg" class="form-msg" style="display:none;margin-bottom:12px;"></p>
        <form id="slotEditForm">
          <div class="g2">
            <div class="form-group">
              <label class="form-label">Select Slot</label>
              <select class="form-input" id="editSlotSelect" required>
                <option value="">— Choose a slot —</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Section</label>
              <input class="form-input" id="editSlotSection" type="text" readonly placeholder="—">
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-input" id="editSlotStatus" name="status" required>
                <option value="AVAILABLE">Available</option>
                <option value="OCCUPIED">Occupied</option>
                <option value="MAINTENANCE">Maintenance</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Current Vehicle</label>
              <input class="form-input" id="editSlotVehicle" type="text" readonly placeholder="—">
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:20px;">
            <button type="submit" class="btn btn-teal" id="editSlotSubmitBtn">Save Changes</button>
            <button type="button" class="btn btn-outline" onclick="toggleEditSlot()">Cancel</button>
          </div>
        </form>
      </div>

      <div class="g4 mb-28">
        <div class="stat-card c-dark"><div class="accent-bar"></div><div class="stat-label">Total Slots</div><div class="stat-value" id="statTotalSlots">—</div></div>
        <div class="stat-card c-teal"><div class="accent-bar"></div><div class="stat-label">Available</div><div class="stat-value" id="statAvailableSlots">—</div></div>
        <div class="stat-card c-orange"><div class="accent-bar"></div><div class="stat-label">Occupied</div><div class="stat-value" id="statOccupiedSlots">—</div></div>
        <div class="stat-card c-danger"><div class="accent-bar"></div><div class="stat-label">Maintenance</div><div class="stat-value" id="statMaintenanceSlots">—</div></div>
      </div>
      <div class="filter-bar">
        <div class="search-wrap"><div class="search-bar"><span>🔍</span><input type="text" id="slotSearch" placeholder="Search by slot ID..."></div></div>
        <select class="form-input" id="slotSectionFilter" style="width:140px;padding:9px 14px;">
          <option value="all">All Sections</option>
        </select>
        <select class="form-input" id="slotStatusFilter" style="width:150px;padding:9px 14px;">
          <option value="all">All Status</option>
          <option value="AVAILABLE">Available</option>
          <option value="OCCUPIED">Occupied</option>
          <option value="MAINTENANCE">Maintenance</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Slot ID</th><th>Section</th><th>Status</th><th>Current Vehicle</th><th>Last Updated</th></tr></thead>
          <tbody id="slotsTableBody">
            <tr><td colspan="9" style="text-align:center;color:var(--ink-muted);padding:24px;">Loading slots…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/slot-management.js"></script>

</body>
</html>
