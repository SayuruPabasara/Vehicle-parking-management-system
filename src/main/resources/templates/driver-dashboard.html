<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkNow — Driver Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/parknow.css">
</head>

<body onclick="closeDropdown()">

    <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo" onclick="nav('pg-vehicles')"><div class="logo-mark">P</div>ParkNow</div>
    <div class="topbar-right">
      <span style="font-size:0.8rem;color:var(--ink-muted);">Driver Portal</span>
      <button class="btn btn-outline btn-sm" type="button" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div style="padding:16px 12px 0;">
        <div class="sidebar-user">
          <div class="sidebar-avatar" style="background:linear-gradient(135deg,var(--gold),var(--orange));color:var(--dark);" th:with="pad=${username + username}" th:text="${#strings.toUpperCase(#strings.substring(pad,0,2))}">JD</div>
          <div>
            <div class="sidebar-uname" th:text="${username}">John Doe</div>
            <div class="sidebar-role">Driver Account</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">Main</div>
        <button class="sidebar-item active" onclick="showPage('pg-dashboard')"><span class="s-icon">🏠</span> Dashboard</button>
        <button class="sidebar-item" onclick="showPage('pg-slotMap')"><span class="s-icon">🗺️</span> Parking Map</button>
        <button class="sidebar-item" onclick="showPage('pg-bookings')"><span class="s-icon">📅</span> Book a Slot</button>
        <div class="sidebar-section">Account</div>
        <button class="sidebar-item" onclick="showPage('pg-vehicles')"><span class="s-icon">🚗</span> My Vehicles</button>
        <button class="sidebar-item" onclick="showPage('pg-profile')"><span class="s-icon">👤</span> My Profile</button>
        <button class="sidebar-item" onclick="showPage('pg-feedback')"><span class="s-icon">💬</span> Give Feedback</button>
        <button class="sidebar-item" onclick="showPage('pg-billing')"><span class="s-icon">🧾</span> Billing</button>
      </nav>
   
    </aside>

    <!-- Main -->
    <main class="main-content">
      <!-- Welcome band -->
      <div class="welcome-band">
        <div class="wb-bg">🚗</div>
        <div style="position:relative;z-index:1;">
          <div class="wb-title">Good morning, <span th:text="${username}">John</span>! 👋</div>
        </div>
        <div style="display:flex;gap:10px;position:relative;z-index:1;">
          <button class="btn btn-gold btn-lg" onclick="showPage('pg-bookings')">+ Book a Slot</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="g4 mb-28">
        <div class="stat-card c-gold">
          <div class="accent-bar"></div>
          <div class="stat-icon">📅</div>
          <div class="stat-label">Total Bookings</div>
          <div class="stat-value" th:text="${totalBookings}">0</div>
          <div class="stat-sub">All time</div>
        </div>
        <div class="stat-card c-orange">
          <div class="accent-bar"></div>
          <div class="stat-icon">💰</div>
          <div class="stat-label">Pending Bill</div>
          <div class="stat-value" style="font-size:1.4rem;" th:text="${amountDueDisplay}">LKR 0</div>
          <div class="stat-sub" style="margin-top:8px;"><button class="btn btn-orange btn-sm" onclick="showPage('pg-billing')" style="width:100%;justify-content:center;">Pay Now</button></div>
        </div>
        <div class="stat-card c-teal">
          <div class="accent-bar"></div>
          <div class="stat-icon">🟢</div>
          <div class="stat-label">Active Sessions</div>
          <div class="stat-value" th:text="${activeSessions}">0</div>
          <div class="stat-sub" style="margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="showPage('pg-billing')" style="width:100%;justify-content:center;">Manage</button></div>
        </div>
        <div class="stat-card c-dark">
          <div class="accent-bar"></div>
          <div class="stat-icon">🚗</div>
          <div class="stat-label">Registered Vehicles</div>
          <div class="stat-value" th:text="${vehicleCount}">0</div>
          <div class="stat-sub" style="margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="showPage('pg-vehicles')" style="width:100%;justify-content:center;">Manage</button></div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="section-title">Quick Actions</div>
      <div class="quick-grid mb-28">
        <div class="quick-card" onclick="showPage('pg-bookings')"><div class="qc-icon">📅</div><div class="qc-label">Book a Slot</div></div>
        <div class="quick-card" onclick="showPage('pg-vehicles')"><div class="qc-icon">🚗</div><div class="qc-label">Register Vehicle</div></div>
        <div class="quick-card" onclick="showPage('pg-slotMap')"><div class="qc-icon">🗺️</div><div class="qc-label">Live Map</div></div>
        <div class="quick-card" onclick="showPage('pg-feedback')"><div class="qc-icon">⭐</div><div class="qc-label">Give Feedback</div></div>
      </div>

      
    </main>
  </div>

    <script src="/js/auth.js"></script>
    <script src="/js/driver-dashboard.js"></script>
</body>

</html>
